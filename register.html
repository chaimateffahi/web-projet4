<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - EduShare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📚 EduShare</h1>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="ressources.html">Ressources</a>
        <a href="quiz.html">Quiz</a>
        <a href="login.html">Connexion</a>
    </nav>
</header>
<main>
    <div class="form-container">
        <h2>Inscription</h2>
        <div class="form-group">
            <label>Nom complet</label>
            <input type="text" placeholder="Votre nom">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Votre email">
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" placeholder="Votre mot de passe">
        </div>
        <div class="form-group">
            <label>Rôle</label>
            <select style="width:100%; padding:12px; border:1px solid #ddd; border-radius:5px; font-size:16px;">
                <option>Étudiant</option>
                <option>Enseignant</option>
            </select>
        </div>
        <button class=« btn-submit »>S’inscrire</button>
        <p>Déjà un compte? <a href="login.html">Se connecter</a></p>
    </div>
</main>
<footer>
    <p>© 2025 EduShare</p>
</footer>

</body>
</html>
